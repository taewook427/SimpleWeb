<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAS-static</title>
    
    <script src="https://cdn.jsdelivr.net/npm/js-sha3@0.9.3/src/sha3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js"></script>
    <script type="module">
        import {x448, ed448} from 'https://esm.sh/@noble/curves@1.4.0/ed448';
        window.noble = {x448, ed448};
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/k-atusa/usag-lib@main/Icons/Icons.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/k-atusa/usag-lib@main/Bencrypt/Bencrypt.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/k-atusa/usag-lib@main/Opsec/Opsec.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/k-atusa/usag-lib@main/Szip/Szip.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/k-atusa/usag-lib@main/Star/Star.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input[type="text"], input[type="password"], textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 80px; }
        .flex-row { display: flex; gap: 15px; }
        .flex-row > div { flex: 1; }
        .radio-group label { display: inline-block; font-weight: normal; margin-right: 15px; cursor: pointer; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .btn-decrypt { background-color: #e67e22; margin-top: 10px; }
        .btn-decrypt:hover { background-color: #d35400; }
        #output-section { background-color: #ecf0f1; border-left: 4px solid #2ecc71; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>Simple Static YAS-web</h1>

    <div class="card">
        <h3>1. Data Input</h3>
        <div class="form-group">
            <label for="fileInput">Select File (Optional)</label>
            <input type="file" id="fileInput" multiple>
        </div>
        <div class="form-group">
            <label for="smsgInput">Secure Message</label>
            <textarea id="smsgInput" placeholder="Type your secret message here"></textarea>
        </div>
    </div>

    <div class="card">
        <h3>2. Encryption Options</h3>
        <div class="flex-row">
            <div class="form-group">
                <label>Prehead Image</label>
                <select id="optImage">
                    <option value="bin">None (bin)</option>
                    <option value="webp">WebP Image</option>
                    <option value="png">PNG Image</option>
                </select>
            </div>
            <div class="form-group">
                <label>Packing Type</label>
                <select id="optPack">
                    <option value="tar1">Tar1</option>
                    <option value="zip1">Zip1</option>
                </select>
            </div>
            <div class="form-group">
                <label>Symmetric Encryption</label>
                <select id="optEnc">
                    <option value="gcmx1">AES-GCMX1</option>
                    <option value="gcm1">AES-GCM1</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>3. Authentication Method</h3>
        <div class="form-group radio-group">
            <label><input type="radio" name="authMode" value="password" checked onchange="toggleAuthMode()"> Password</label>
            <label><input type="radio" name="authMode" value="publickey" onchange="toggleAuthMode()"> Public Key</label>
        </div>

        <div id="pwModeArea">
            <div class="form-group flex-row">
                <div style="flex: 0.3;">
                    <label>KDF Type</label>
                    <select id="pwAlgo">
                        <option value="arg1">Argon2 (arg1)</option>
                        <option value="pbk1">PBKDF2 (pbk1)</option>
                    </select>
                </div>
                <div style="flex: 0.7;">
                    <label for="pwInput">Password</label>
                    <input type="password" id="pwInput" placeholder="Type your password">
                </div>
            </div>
        </div>

        <div id="pubModeArea" class="hidden">
            <div class="form-group flex-row" style="align-items: flex-end;">
                <div style="flex: 0.7;">
                    <label>Algorithm Type</label>
                    <select id="pubAlgo">
                        <option value="ecc1">Curve-448 (ecc1)</option>
                        <option value="rsa1">RSA-2048 (rsa1)</option>
                    </select>
                </div>
                <div style="flex: 0.3;">
                    <button type="button" onclick="handleGenerateKeys()" style="background-color: #9b59b6;">🔑 Make New Pair</button>
                </div>
            </div>
            <div class="form-group">
                <label for="pubKeyInput">Peer's Public Key (Encryption, Validation)</label>
                <input type="text" id="pubKeyInput" placeholder="Base64 Text">
            </div>
            <div class="form-group">
                <label for="privKeyInput">My Private Key (Decryption, Signing)</label>
                <input type="password" id="privKeyInput" placeholder="Base64 Text">
                <small style="color: #e74c3c; font-weight: bold; display: none; margin-top: 5px;" id="keyBackupWarning">
                    ⚠️ Copy generated key pair to the clipboard and keep it safe.
                </small>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>4. Public Message</h3>
        <div class="form-group">
            <textarea id="msgInput" placeholder="Everyone can see this text"></textarea>
        </div>
    </div>

    <div class="card">
        <button type="button" onclick="handleEncrypt()">🔒 Encrypt</button>
        <button type="button" class="btn-decrypt" onclick="handleDecrypt()">🔓 Decrpyt</button>
    </div>

    <div class="card hidden" id="output-section">
        <h3>Result</h3>
        <div class="form-group">
            <label>Public Message</label>
            <textarea id="outMsg" readonly></textarea>
        </div>
        <div class="form-group">
            <label>Secure Message</label>
            <textarea id="outSmsg" readonly></textarea>
        </div>
        <div id="downloadArea" class="form-group hidden">
            <label>Output File</label>
            <a id="downloadLink" href="#" style="display:block; padding:10px; background:#2ecc71; color:white; text-align:center; text-decoration:none; border-radius:4px; font-weight:bold;">파일 다운로드</a>
        </div>
        <div id="fileListArea" class="form-group hidden">
            <label>Output Files</label>
            <ul id="extractedFilesList" style="list-style-type: none; padding: 0;"></ul>
        </div>
    </div>

    <script>
        // toggle auth mode
        function toggleAuthMode() {
            const mode = document.querySelector('input[name="authMode"]:checked').value;
            if (mode === 'password') {
                document.getElementById('pwModeArea').classList.remove('hidden');
                document.getElementById('pubModeArea').classList.add('hidden');
            } else {
                document.getElementById('pwModeArea').classList.add('hidden');
                document.getElementById('pubModeArea').classList.remove('hidden');
            }
        }

        // helper between Base64 and Uint8Array
        function u8ToBase64(u8) {
            let binary = '';
            for (let i = 0; i < u8.length; i++) {
                binary += String.fromCharCode(u8[i]);
            }
            return window.btoa(binary);
        }
        function base64ToU8(b64) {
            const binary = window.atob(b64);
            const u8 = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                u8[i] = binary.charCodeAt(i);
            }
            return u8;
        }

        // download files
        function addDownloadLink(fullPath, uint8Data) {
            // get pure file name
            const fileName = fullPath.split('/').pop();
            if (!fileName) return;
            const blob = new Blob([uint8Data], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);

            const li = document.createElement('li');
            li.style.marginBottom = "10px";
            
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName; // download as filename
            a.innerText = `💾 ${fileName} (${(uint8Data.length / 1024).toFixed(1)} KB)`;
            a.style.display = "inline-block";
            a.style.padding = "10px 15px";
            a.style.background = "#2ecc71";
            a.style.color = "white";
            a.style.textDecoration = "none";
            a.style.borderRadius = "4px";
            a.style.fontWeight = "bold";
            a.style.width = "100%";
            a.style.boxSizing = "border-box";
            
            // hover effect
            a.onmouseover = () => a.style.background = "#27ae60";
            a.onmouseout = () => a.style.background = "#2ecc71";
            li.appendChild(a);
            document.getElementById('extractedFilesList').appendChild(li);
        }

        // encrypt button
        async function handleEncrypt() {
            const btn = document.querySelector('button[onclick="handleEncrypt()"]');
            const originalText = btn.innerText;
            
            try {
                btn.innerText = "⏳ Encrypting...";
                btn.disabled = true;

                // 1. fetch UI values
                const files = document.getElementById('fileInput').files;
                const smsg = document.getElementById('smsgInput').value;
                const msg = document.getElementById('msgInput').value;
                
                const optImage = document.getElementById('optImage').value;
                const optPack = document.getElementById('optPack').value;
                const optEnc = document.getElementById('optEnc').value;
                const authMode = document.querySelector('input[name="authMode"]:checked').value;
                
                if (files.length === 0 && !smsg) {
                    throw new Error("No file or secure message.");
                }

                // 2. prepare Opsec header
                const ops = new Opsec();
                ops.msg = msg;
                ops.smsg = smsg;

                // pack files
                let packedData = new Uint8Array(0);
                let sm = null;

                if (files.length > 0) { // file mode
                    const writer = optPack === 'zip1' ? new ZipWriter("", false) : new TarWriter("");
                    for (let i = 0; i < files.length; i++) {
                        if (optPack === 'zip1') {
                            await writer.writefile(files[i].name, files[i]);
                        } else {
                            await writer.write(files[i].name, files[i], false);
                        }
                    }
                    packedData = await writer.close();

                    sm = new SymMaster(optEnc, new Uint8Array(44)); // dummy for size calculation
                    ops.size = sm.aftersize(packedData.length);
                    ops.contAlgo = optPack;
                    ops.bodyAlgo = optEnc;

                } else { // message mode
                    ops.size = -1; 
                }

                // 3. encrypt header
                let headerBytes;
                if (authMode === 'password') {
                    const pwAlgo = document.getElementById('pwAlgo').value;
                    const pw = document.getElementById('pwInput').value;
                    if (!pw) throw new Error("No password.");
                    headerBytes = await ops.encpw(pwAlgo, pw);
                } else {
                    const pubAlgo = document.getElementById('pubAlgo').value;
                    const peerPubStr = document.getElementById('pubKeyInput').value;
                    const myPriStr = document.getElementById('privKeyInput').value;
                    if (!peerPubStr) throw new Error("No public key.");
                    
                    const peerPub = base64ToU8(peerPubStr);
                    const myPri = myPriStr ? base64ToU8(myPriStr) : null;
                    headerBytes = await ops.encpub(pubAlgo, peerPub, myPri);
                }

                // 4. write ouput stream
                const outChunks = [];
                const outs = { write: async (d) => outChunks.push(d) };
                
                // add prehead when file mode
                if (files.length > 0 && optImage !== 'bin' && typeof Icons !== 'undefined') {
                    let ico = new Uint8Array();
                    if (authMode === 'password') {
                        if (optImage === 'webp') {
                            ico = Icons.AesWebp;
                        } else if (optImage === 'png') {
                            ico = Icons.AesPng;
                        }
                    } else {
                        if (optImage === 'webp') {
                            ico = Icons.CloudWebp;
                        } else if (optImage === 'png') {
                            ico = Icons.CloudPng;
                        }
                    }
                    if (ico) { // 128B padding
                        let padLen = 128 - (ico.length % 128);
                        if (padLen === 128) padLen = 0;
                        let prehead = new Uint8Array(ico.length + padLen);
                        prehead.set(ico, 0);
                        outChunks.push(prehead);
                    }
                }

                // write Opsec format
                await ops.write(outs, headerBytes);

                // encrypt file
                if (files.length > 0) {
                    sm = new SymMaster(optEnc, ops.bodyKey); // use real key
                    const encryptedBody = await sm.enBin(packedData);
                    outChunks.push(encryptedBody);
                }

                // 5. merge data
                let totalLen = 0;
                for (let c of outChunks) totalLen += c.length;
                const finalU8 = new Uint8Array(totalLen);
                let offset = 0;
                for (let c of outChunks) {
                    finalU8.set(c, offset);
                    offset += c.length;
                }

                // 6. update UI
                document.getElementById('output-section').classList.remove('hidden');
                const outMsgBox = document.getElementById('outMsg').parentElement;
                const outSmsgBox = document.getElementById('outSmsg').parentElement;
                const downloadBox = document.getElementById('downloadArea');
                const outFilesBox = document.getElementById('fileListArea');

                // message mode
                if (files.length === 0) {
                    outMsgBox.classList.add('hidden');
                    downloadBox.classList.add('hidden');
                    outSmsgBox.classList.remove('hidden');
                    outFilesBox.classList.add('hidden');
                    
                    const outSmsgArea = document.getElementById('outSmsg');
                    outSmsgArea.previousElementSibling.innerText = "Encrypted result (Base64)";
                    outSmsgArea.value = u8ToBase64(finalU8);
                    alert("Encrypted message generated.");

                // file mode
                } else {
                    outMsgBox.classList.add('hidden');
                    outSmsgBox.classList.add('hidden');
                    downloadBox.classList.remove('hidden');

                    const blob = new Blob([finalU8], { type: "application/octet-stream" });
                    const url = URL.createObjectURL(blob);
                    const dl = document.getElementById('downloadLink');
                    
                    let ext = ".txt";
                    if (optImage === 'webp') ext = ".webp";
                    if (optImage === 'png') ext = ".png";
                    
                    dl.href = url;
                    dl.download = "encrypted" + ext;
                    alert("Encryption completed successfully.");
                }

            } catch (e) {
                console.error(e);
                alert("Encrytpion failed: " + e.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // decrypt button
        async function handleDecrypt() {
            const btn = document.querySelector('.btn-decrypt');
            const originalText = btn.innerText;

            try {
                btn.innerText = "⏳ Decrypting...";
                btn.disabled = true;

                // 1. get values from UI
                const files = document.getElementById('fileInput').files;
                const smsgInput = document.getElementById('smsgInput').value;
                const authMode = document.querySelector('input[name="authMode"]:checked').value;

                let dataU8;
                if (files.length > 0) {
                    dataU8 = new Uint8Array(await files[0].arrayBuffer());
                } else if (smsgInput) {
                    dataU8 = base64ToU8(smsgInput.trim());
                } else {
                    throw new Error("No file/message to decrypt.");
                }

                // 2. make stream reader
                const reader = {
                    data: dataU8,
                    pos: 0,
                    async read(size) {
                        if (this.pos >= this.data.length) return new Uint8Array(0);
                        const end = Math.min(this.pos + size, this.data.length);
                        const chunk = this.data.slice(this.pos, end);
                        this.pos = end;
                        return chunk;
                    }
                };

                // 3. read OPsec header
                const ops = new Opsec();
                const headerBytes = await ops.read(reader, 0); 
                if (!headerBytes || headerBytes.length === 0) {
                    throw new Error("Invalid Opsec format.");
                }

                // 4. parse header
                ops.view(headerBytes);
                if (authMode === 'password') {
                    const pw = document.getElementById('pwInput').value;
                    if (!pw) throw new Error("No password.");
                    await ops.decpw(pw); 
                } else {
                    const myPriStr = document.getElementById('privKeyInput').value;
                    const peerPubStr = document.getElementById('pubKeyInput').value;
                    if (!myPriStr) throw new Error("No private key.");
                    const myPri = base64ToU8(myPriStr);
                    const peerPub = peerPubStr ? base64ToU8(peerPubStr) : null; 
                    await ops.decpub(myPri, peerPub);
                }

                // 5. Update UI
                document.getElementById('output-section').classList.remove('hidden');
                const outMsgArea = document.getElementById('outMsg');
                const outSmsgArea = document.getElementById('outSmsg');
                const fileListArea = document.getElementById('fileListArea');
                const fileList = document.getElementById('extractedFilesList');
                fileList.innerHTML = '';
                
                // update messages
                if (ops.msg) {
                    outMsgArea.parentElement.classList.remove('hidden');
                    outMsgArea.value = ops.msg;
                } else {
                    outMsgArea.parentElement.classList.add('hidden');
                }
                if (ops.smsg) {
                    outSmsgArea.parentElement.classList.remove('hidden');
                    outSmsgArea.previousElementSibling.innerText = "Secure message view";
                    outSmsgArea.value = ops.smsg;
                } else {
                    outSmsgArea.parentElement.classList.add('hidden');
                }

                // 6. body decryption, unpack
                if (ops.size >= 0) {
                    const sm = new SymMaster(ops.bodyAlgo, ops.bodyKey);
                    const encBody = dataU8.slice(reader.pos);
                    const decBody = await sm.deBin(encBody);

                    btn.innerText = "⏳ Extracting...";

                    if (ops.contAlgo === 'zip1') {
                        const zr = new ZipReader(decBody);
                        await zr.init();
                        for (let i = 0; i < zr.names.length; i++) {
                            // jump folder
                            if (zr.names[i].endsWith('/')) continue; 
                            const fileData = await zr.read(i);
                            addDownloadLink(zr.names[i], fileData);
                        }
                    } else if (ops.contAlgo === 'tar1') {
                        const tr = new TarReader(decBody);
                        await tr.init();
                        for (let i = 0; i < tr.files.length; i++) {
                            // jump folder
                            if (tr.files[i].isDir) continue; 
                            const fileData = tr.read(i);
                            addDownloadLink(tr.files[i].name, fileData);
                        }
                    }

                    if (fileList.children.length > 0) {
                        fileListArea.classList.remove('hidden');
                    } else {
                        fileListArea.classList.add('hidden');
                    }
                } else {
                    fileListArea.classList.add('hidden'); // message mode
                }
                alert("Decryption completed successfully.");

            } catch (e) {
                console.error(e);
                alert("Decryption failed: " + e.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // generate button
        async function handleGenerateKeys() {
            const algo = document.getElementById('pubAlgo').value; // 'rsa1', 'ecc1'
            const btn = document.querySelector('button[onclick="handleGenerateKeys()"]');
            const originalText = btn.innerText;
            
            try {
                btn.innerText = "⏳ Generating...";
                btn.disabled = true;
                await new Promise(resolve => setTimeout(resolve, 50));

                // generate key from Bencrypt.js/AsymMaster
                const am = new AsymMaster(algo);
                const [pubU8, priU8] = await am.genkey();
                document.getElementById('pubKeyInput').value = u8ToBase64(pubU8);
                document.getElementById('privKeyInput').value = u8ToBase64(priU8);

                // update UI
                const privInput = document.getElementById('privKeyInput');
                privInput.type = 'text'; 
                document.getElementById('keyBackupWarning').style.display = 'block';
                alert(`${algo.toUpperCase()} Key pair generated. Keep key pair for next use.`);

            } catch (e) {
                console.error(e);
                alert("Generation failed: " + e.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // Init Bencrypt.js when DOM is ready
        window.addEventListener('DOMContentLoaded', (event) => {
            if (typeof InitBencrypt === 'function') {
                InitBencrypt();
                console.log("Bencrypt initialized.");
            } else {
                console.error("Cannot find InitBencrypt()");
            }
        });
    </script>
</body>

</html>
